format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android

trigger_map:
- push_branch: '*'
  workflow: primary
- pull_request_source_branch: '*'
  workflow: primary

workflows:
  primary:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | not_empty}}'
    - git-clone@8: {}
    - cache-pull@2: {}
    - install-missing-android-tools@3:
        inputs:
        - gradlew_path: ./gradlew
    - change-android-versioncode-and-versionname@1:
        inputs:
        - build_gradle_path: app/build.gradle.kts
    - android-build@1:
        inputs:
        - project_location: .
        - module: app
        - variant: debug
        - build_type: apk
    - cache-push@2: {}
    - deploy-to-bitrise-io@2: {}
